process_data:
  data_dir: data/raw
  output_dir: data/processed
  resolution_factor: 10
  grid_resolution: 0.002
  interp_method: cubic

create_cluster:
  data_dir: data/processed
  output_dir: output
  n_clusters: 5
  random_state: 42
  features:
    - DEM
    - Mag_Final
    - Pot_final
    - Tho_Final
    - Ura_Final
  algorithm: kmeans
  algo_params:
    kmeans:
      n_init: 20
      max_iter: 500
      tol: 0.001
    fcm:
      m: 2.0
      error: 1.0e-5
      maxiter: 150
